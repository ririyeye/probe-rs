# CH32H4 Series Target Description for probe-rs
# WCH CH32H415/CH32H416/CH32H417 (QingKe-V5F + QingKe-V3F)
# Flash algorithm: compiled from ch32-rs/flash-algorithms/ch32h417

name: CH32H4 Series
variants:
- name: CH32H417
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
      hart_id: 0
      jtag_tap: 0
  - name: v3f_coprocessor
    type: riscv
    core_access_options: !Riscv
      hart_id: 1
      jtag_tap: 1
  memory_map:
  - !Nvm
    range:
      start: 0x08000000
      end: 0x08078000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200A0000
      end: 0x200C0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200C0000
      end: 0x200C0400
    cores:
    - v3f_coprocessor
  - !Ram
    range:
      start: 0x200C0400
      end: 0x20100000
    cores:
    - main
  flash_algorithms:
  - ch32h41x-flash-algo
- name: CH32H415
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Nvm
    range:
      start: 0x08000000
      end: 0x08078000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200A0000
      end: 0x200C0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200C0400
      end: 0x20100000
    cores:
    - main
  flash_algorithms:
  - ch32h41x-flash-algo
- name: CH32H416
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Nvm
    range:
      start: 0x08000000
      end: 0x08078000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200A0000
      end: 0x200C0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200C0400
      end: 0x20100000
    cores:
    - main
  flash_algorithms:
  - ch32h41x-flash-algo
# NOTE: The flash algorithm below (Path A: DMI-based, loaded to target RAM)
# does NOT work for CH32H41X. The target algorithm returns 0 (BSY=0, flash
# controller never receives commands). Root cause unknown.
# Flash operations instead go through the probe-assisted path
# (WCH-Link firmware built-in commands, Path B) which has been verified.
# This algorithm is kept for reference and future debugging.
flash_algorithms:
- name: ch32h41x-flash-algo
  description: Flash algorithm for CH32H41x series (QingKe-V5F core) -- EXPERIMENTAL, known broken
  default: true
  instructions: 
  load_address: 0x200A0020
  pc_init: 0x68
  pc_uninit: 0x1b2
  pc_program_page: 0x118
  pc_erase_sector: 0x0
  data_section_offset: 0x200a02e4
  flash_properties:
    address_range:
      start: 0x08000000
      end: 0x08078000
    page_size: 0x100
    erased_byte_value: 0x39
    program_page_timeout: 5000
    erase_sector_timeout: 10000
    sectors:
    - size: 0x1000
      address: 0x0
  cores:
  - main
