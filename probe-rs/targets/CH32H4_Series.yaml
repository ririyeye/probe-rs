name: CH32H4 Series
variants:
- name: CH32H417
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
      hart_id: 1
      jtag_tap: 0
  - name: v3f_coprocessor
    type: riscv
    core_access_options: !Riscv
      hart_id: 0
      jtag_tap: 0
  memory_map:
  - !Nvm
    range:
      start: 0x8000000
      end: 0x8078000
    cores:
    - v3f_coprocessor
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200a0000
      end: 0x200c0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200c0000
      end: 0x20100000
    cores:
    - main
  - !Ram
    range:
      start: 0x20100000
      end: 0x20180000
    cores:
    - v3f_coprocessor
  flash_algorithms:
  - ch32h41x-flash-algo
- name: CH32H415
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Nvm
    range:
      start: 0x8000000
      end: 0x8078000
    cores:
    - v3f_coprocessor
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200a0000
      end: 0x200c0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200c0400
      end: 0x20100000
    cores:
    - main
  flash_algorithms:
  - ch32h41x-flash-algo
- name: CH32H416
  cores:
  - name: main
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Nvm
    range:
      start: 0x8000000
      end: 0x8078000
    cores:
    - v3f_coprocessor
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20004000
    cores:
    - main
  - !Ram
    range:
      start: 0x200a0000
      end: 0x200c0000
    cores:
    - main
  - !Ram
    range:
      start: 0x200c0400
      end: 0x20100000
    cores:
    - main
  flash_algorithms:
  - ch32h41x-flash-algo
flash_algorithms:
- name: ch32h41x-flash-algo
  description: Flash algorithm for CH32H41x series (QingKe-V3F core) -- EXPERIMENTAL, testing V3F theory
  default: true
  instructions: 
  load_address: 0x20100020
  pc_init: 0x68
  pc_uninit: 0x1c4
  pc_program_page: 0x12a
  pc_erase_sector: 0x0
  data_section_offset: 0x201002e4
  flash_properties:
    address_range:
      start: 0x8000000
      end: 0x8078000
    page_size: 0x100
    erased_byte_value: 0x39
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x1000
      address: 0x0
  cores:
  - v3f_coprocessor
  - main
